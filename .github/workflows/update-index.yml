name: Update Plugin Index

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*.json'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/*.json'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Validate and generate index
        run: node validate-and-index.mjs
        working-directory: scripts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push index
        if: github.ref == 'refs/heads/main' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.json plugins/
          git commit -m "chore: regenerate plugin index"
          git push
